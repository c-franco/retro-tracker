version: '3.8'

services:
  retrogame-tracker:
    build: .
    container_name: retrogame-tracker
    ports:
      - "8080:8080"
    volumes:
      - retrogame-data:/app/data
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production

volumes:
  retrogame-data:
    driver: local
