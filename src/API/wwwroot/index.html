<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🕹️</span>
      <span class="logo-text" data-text="meta.title"></span>
    </div>
    <ul class="nav-links">
      <li><a href="#" class="nav-link active" data-view="dashboard">📊 <span data-text="nav.dashboard"></span></a></li>
      <li><a href="#" class="nav-link" data-view="inventory">📦 <span data-text="nav.inventory"></span></a></li>
      <li><a href="#" class="nav-link" data-view="lots">🎁 <span data-text="nav.lots"></span></a></li>
      <li><a href="#" class="nav-link" data-view="quick-add">⚡ <span data-text="nav.quickAdd"></span></a></li>
      <li><a href="#" class="nav-link" data-view="settings">⚙️ <span data-text="nav.settings"></span></a></li>
    </ul>
    <div class="sidebar-bottom">
      <button class="btn-export" onclick="App.exportExcel()" style="margin-bottom:0.5rem">📥 <span data-text="nav.exportExcel"></span></button>
      <button class="btn-export" onclick="document.getElementById('import-file-input').click()">📤 <span data-text="nav.importExcel"></span></button>
      <input type="file" id="import-file-input" accept=".xlsx" style="display:none" onchange="App.importExcel(this)" />
    </div>
  </nav>

  <!-- MOBILE HEADER -->
  <header class="mobile-header">
    <button class="burger" id="burgerBtn" onclick="App.toggleSidebar()">☰</button>
    <span class="mobile-title">🕹️ <span data-text="meta.title"></span></span>
    <button class="btn-sm" onclick="App.showView('quick-add')">⚡</button>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- ──── DASHBOARD ──── -->
    <section id="view-dashboard" class="view active">
      <div class="view-header">
        <h1 data-text="dashboard.title"></h1>
      </div>

      <div class="stats-grid" id="dash-stats">
        <div class="stat-card invested">
          <div class="stat-icon">💸</div>
          <div class="stat-body">
            <div class="stat-value" id="stat-invested">—</div>
            <div class="stat-label" data-text="dashboard.invested"></div>
          </div>
        </div>
        <div class="stat-card revenue">
          <div class="stat-icon">💰</div>
          <div class="stat-body">
            <div class="stat-value" id="stat-revenue">—</div>
            <div class="stat-label" data-text="dashboard.recovered"></div>
          </div>
        </div>
        <div class="stat-card profit">
          <div class="stat-icon">📈</div>
          <div class="stat-body">
            <div class="stat-value" id="stat-profit">—</div>
            <div class="stat-label" data-text="dashboard.profit"></div>
          </div>
        </div>
        <div class="stat-card balance">
          <div class="stat-icon">🏦</div>
          <div class="stat-body">
            <div class="stat-value" id="stat-balance">—</div>
            <div class="stat-label" data-text="dashboard.finalBalance"></div>
          </div>
        </div>
        <div class="stat-card stock">
          <div class="stat-icon">🗃️</div>
          <div class="stat-body">
            <div class="stat-value" id="stat-stock-value">—</div>
            <div class="stat-label" data-text="dashboard.stockValue"></div>
            <div class="stat-sublabel" id="stat-stock-count"></div>
          </div>
        </div>
        <div class="stat-card collection">
          <div class="stat-icon">⭐</div>
          <div class="stat-body">
            <div class="stat-value" id="stat-collection-value">—</div>
            <div class="stat-label" data-text="dashboard.collectionValue"></div>
            <div class="stat-sublabel" id="stat-collection-count"></div>
          </div>
        </div>
      </div>

      <div class="charts-row">
        <div class="chart-card">
          <h3 data-text="dashboard.monthlyChart"></h3>
          <div class="chart-canvas-wrap">
            <canvas id="chartMonthly"></canvas>
          </div>
        </div>
        <div class="chart-card" id="chart-platform-card">
          <h3 data-text="dashboard.byPlatform"></h3>
          <!-- Vista gráfico (escritorio) -->
          <div class="chart-canvas-wrap chart-canvas-wrap--donut">
            <canvas id="chartPlatform"></canvas>
          </div>
          <!-- Vista lista (móvil) -->
          <div id="platformList" class="platform-list" style="display:none"></div>
        </div>
      </div>

      <div class="pending-section">
        <h3>📋 <span data-text="dashboard.pendingToSell"></span> <span class="badge" id="pending-count">0</span></h3>
        <div class="table-wrap">
          <table class="data-table" id="pending-table">
            <thead>
              <tr>
                <th data-text="dashboard.pending.item"></th><th data-text="dashboard.pending.platform"></th><th data-text="dashboard.pending.type"></th>
                <th data-text="dashboard.pending.cost"></th><th data-text="dashboard.pending.daysInStock"></th><th data-text="dashboard.pending.action"></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ──── INVENTARIO ──── -->
    <section id="view-inventory" class="view">
      <div class="view-header">
        <h1 data-text="inventory.title"></h1>
        <button class="btn-primary" onclick="App.openItemModal()">+ <span data-text="inventory.addItem"></span></button>
      </div>

      <div class="filters-bar">
        <input type="search" id="search-input" data-placeholder="inventory.searchPlaceholder"
               oninput="App.loadInventory()" />
        <select id="filter-platform" onchange="App.loadInventory()">
          <option value="" data-text="inventory.allPlatforms"></option>
        </select>
        <select id="filter-type" onchange="App.loadInventory()">
          <option value="" data-text="inventory.allTypes"></option>
          <option value="Console" data-text="inventory.type.console"></option>
          <option value="VideoGame" data-text="inventory.type.videoGame"></option>
          <option value="Accessory" data-text="inventory.type.accessory"></option>
        </select>
        <select id="filter-status" onchange="App.loadInventory()">
          <option value="" data-text="inventory.allStatuses"></option>
          <option value="false" data-text="inventory.status.inStock"></option>
          <option value="true" data-text="inventory.status.sold"></option>
          <option value="collection" data-text="inventory.status.collection"></option>
        </select>
        <div class="tag-filter-wrap">
          <button class="tag-filter-btn" id="tagFilterBtn" onclick="App.toggleTagFilterDropdown()">
            🏷️ <span data-text="inventory.tags"></span> <span id="tagFilterCount"></span>▾
          </button>
          <div class="tag-filter-dropdown" id="tagFilterDropdown"></div>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table" id="inventory-table">
          <thead>
            <tr>
              <th data-text="inventory.column.item"></th>
              <th class="inv-col-tipo" data-text="inventory.column.type"></th>
              <th class="inv-col-plataforma" data-text="inventory.column.platform"></th>
              <th class="inv-col-estado" data-text="inventory.column.status"></th>
              <th class="inv-col-lote" data-text="inventory.column.lot"></th>
              <th class="inv-col-etiquetas" data-text="inventory.column.tags"></th>
              <th class="inv-col-coste" data-text="inventory.column.cost"></th>
              <th class="inv-col-venta" data-text="inventory.column.sale"></th>
              <th class="inv-col-beneficio" data-text="inventory.column.profit"></th>
              <th class="inv-col-fecha" data-text="inventory.column.date"></th>
              <th data-text="inventory.column.actions"></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Paginación -->
      <div class="pagination-bar" id="pagination-bar"></div>
    </section>

    <!-- ──── LOTES ──── -->
    <section id="view-lots" class="view">
      <div class="view-header">
        <h1 data-text="lots.title"></h1>
        <button class="btn-primary" onclick="App.openLotModal()">+ <span data-text="lots.newLot"></span></button>
      </div>
      <div class="filters-bar" style="margin-bottom:1rem">
        <input type="search" id="lots-search" data-placeholder="lots.searchPlaceholder"
               oninput="App.loadLots()" style="min-width:220px;flex:1" />
        <select id="lots-period" onchange="App.loadLots()">
          <option value="" data-text="lots.period.all"></option>
          <option value="week" data-text="lots.period.week"></option>
          <option value="month" data-text="lots.period.month"></option>
          <option value="3months" data-text="lots.period.quarter"></option>
          <option value="6months" data-text="lots.period.halfYear"></option>
          <option value="year" data-text="lots.period.year"></option>
        </select>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="lots-table">
          <thead>
            <tr>
              <th data-text="lots.column.code"></th>
              <th data-text="lots.column.date"></th>
              <th data-text="lots.column.name"></th>
              <th data-text="lots.column.notes"></th>
              <th data-text="lots.column.items"></th>
              <th data-text="lots.column.invested"></th>
              <th data-text="lots.column.recovered"></th>
              <th data-text="lots.column.profit"></th>
              <th data-text="lots.column.actions"></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="pagination-bar" id="lots-pagination-bar"></div>
    </section>

    <!-- ──── REGISTRO RÁPIDO ──── -->
    <section id="view-quick-add" class="view">
      <div class="view-header">
        <h1 data-text="quickAdd.title"></h1>
        <p class="subtitle"></p>
      </div>

      <div class="quick-form-card">
        <div class="form-row">
          <label>Nombre *
            <input type="text" id="qa-name" data-placeholder="quickAdd.namePlaceholder" />
          </label>
          <label>Plataforma *
            <select id="qa-platform"></select>
          </label>
        </div>
        <div class="form-row">
          <label>Tipo *
            <select id="qa-type">
              <option value="Console" data-text="inventory.type.console"></option>
              <option value="VideoGame" data-text="inventory.type.videoGame"></option>
              <option value="Accessory" data-text="inventory.type.accessory"></option>
            </select>
          </label>
          <label>Estado
            <select id="qa-condition">
              <option value="Used" data-text="status.used"></option>
              <option value="New" data-text="status.new"></option>
              <option value="NeedsRepair" data-text="status.needsRepair"></option>
            </select>
          </label>
        </div>
        <div class="form-row">
          <label>Precio Compra (€) *
            <input type="number" id="qa-price" step="0.01" placeholder="0.00" />
          </label>
          <label>Gastos Envío (€)
            <input type="number" id="qa-shipping" step="0.01" placeholder="0.00" value="0" />
          </label>
        </div>
        <div class="form-row">
          <label>Fecha Compra
            <input type="date" id="qa-date" />
          </label>
          <label>Notas
            <input type="text" id="qa-notes" data-placeholder="quickAdd.notesPlaceholder" />
          </label>
        </div>
        <label style="margin-bottom:1rem">Etiquetas
          <div class="pill-input-wrap" id="qa-tags-wrap" onclick="document.getElementById('qa-tag-input').focus()">
            <input type="text" id="qa-tag-input" data-placeholder="quickAdd.addTagPlaceholder" autocomplete="off"
                   oninput="App.tags.onInput('qa')" onkeydown="App.tags.onKey(event,'qa')" />
          </div>
          <div class="tag-suggestions" id="qa-tag-suggestions"></div>
          <span style="font-size:0.75rem;color:var(--text3)" data-text="quickAdd.tagsHelp"></span>
        </label>
        <label style="flex-direction:row;align-items:center;gap:0.6rem;cursor:pointer;margin-bottom:1rem">
          <input type="checkbox" id="qa-collection" style="width:auto;accent-color:var(--accent3)" />
          <span style="font-size:0.85rem;color:var(--text2)" data-text="quickAdd.personalCollection"></span>
        </label>
        <div class="form-actions">
          <button class="btn-primary btn-lg" onclick="App.quickAdd()">✅ <span data-text="quickAdd.addToInventory"></span></button>
          <button class="btn-secondary" onclick="App.quickAddAndSell()">⚡ <span data-text="quickAdd.addAndSellNow"></span></button>
        </div>
        <div id="qa-feedback" class="feedback-msg"></div>
      </div>

      <div class="quick-history">
        <h3 data-text="quickAdd.recentAdditions"></h3>
        <div id="qa-recent" class="recent-list"></div>
      </div>
    </section>

    <!-- ──── AJUSTES ──── -->
    <section id="view-settings" class="view">
      <div class="view-header"><h1 data-text="settings.title"></h1></div>

      <div class="settings-grid">
        <!-- Columna izquierda -->
        <div class="settings-col">
          <div class="settings-card">
            <h3 data-text="settings.financial"></h3>
            <label><span data-text="settings.initialBalance"></span>
              <input type="number" id="settings-balance" step="0.01" />
            </label>
            <label><span data-text="settings.currency"></span>
              <input type="text" id="settings-currency" value="EUR" maxlength="3" />
            </label>
          </div>
          <div class="settings-card" style="margin-top:1rem">
            <h3 data-text="settings.platforms"></h3>
            <p style="font-size:0.82rem;color:var(--text2);margin-bottom:0.8rem" data-text="settings.platformsHelp"></p>
            <textarea id="settings-platforms" rows="10" style="font-family:var(--font-mono);font-size:0.82rem;resize:vertical"></textarea>
          </div>
        </div>

        <!-- Columna derecha -->
        <div class="settings-col">
          <div class="settings-card">
            <h3 data-text="settings.inventoryColumns"></h3>
            <p style="font-size:0.82rem;color:var(--text2);margin-bottom:0.8rem" data-text="settings.inventoryColumnsHelp"></p>
            <div class="col-toggles">
              <label class="col-toggle"><input type="checkbox" data-col="tipo"       checked /> Tipo</label>
              <label class="col-toggle"><input type="checkbox" data-col="plataforma" checked /> Plataforma</label>
              <label class="col-toggle"><input type="checkbox" data-col="estado"     checked /> Estado</label>
              <label class="col-toggle"><input type="checkbox" data-col="lote"       checked /> Lote</label>
              <label class="col-toggle"><input type="checkbox" data-col="etiquetas"  checked /> Etiquetas</label>
              <label class="col-toggle"><input type="checkbox" data-col="coste"      checked /> Coste</label>
              <label class="col-toggle"><input type="checkbox" data-col="venta"      checked /> Venta</label>
              <label class="col-toggle"><input type="checkbox" data-col="beneficio"  checked /> Beneficio</label>
              <label class="col-toggle"><input type="checkbox" data-col="fecha"      checked /> Fecha</label>
            </div>
          </div>
          <div class="settings-card" style="margin-top:1rem">
            <h3>🏷️ <span data-text="settings.tagsTitle"></span></h3>
            <p style="font-size:0.82rem;color:var(--text2);margin-bottom:1rem" data-text="settings.tagsHelp"></p>
            <div id="settings-tags-list" style="display:flex;flex-direction:column;gap:0.4rem"></div>
            <p id="settings-tags-empty" style="font-size:0.82rem;color:var(--text3);display:none" data-text="settings.tagsEmpty"></p>
          </div>
        </div>
      </div>

      <div class="settings-footer">
        <button class="btn-primary btn-lg" onclick="App.saveAllSettings()" data-text="settings.save"></button>
        <div id="settings-feedback" class="feedback-msg"></div>
      </div>
    </section>

  </main>

  <!-- ──── MODAL: ITEM ──── -->
  <div class="modal-overlay" id="modal-item" onclick="App.closeModal('modal-item')">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modal-item-title" data-text="modal.item.addTitle"></h2>
        <button class="modal-close" onclick="App.closeModal('modal-item')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="item-id" />
        <div class="form-row">
          <label>Nombre *<input type="text" id="item-name" /></label>
          <label>Plataforma *<select id="item-platform"></select></label>
        </div>
        <div class="form-row">
          <label>Tipo *
            <select id="item-type">
              <option value="Console" data-text="inventory.type.console"></option>
              <option value="VideoGame" data-text="inventory.type.videoGame"></option>
              <option value="Accessory" data-text="inventory.type.accessory"></option>
            </select>
          </label>
          <label>Condición
            <select id="item-condition">
              <option value="Used" data-text="status.used"></option>
              <option value="New" data-text="status.new"></option>
              <option value="NeedsRepair" data-text="status.needsRepair"></option>
            </select>
          </label>
        </div>
        <div class="form-row">
          <label>Precio Compra (€) *<input type="number" id="item-purchase-price" step="0.01" /></label>
          <label>Gastos Envío (€)<input type="number" id="item-shipping" step="0.01" value="0" /></label>
        </div>
        <div class="form-row">
          <label>Fecha Compra<input type="date" id="item-purchase-date" /></label>
          <label><span data-text="form.lot"></span>
            <select id="item-lot-id">
              <option value="" data-text="common.noLot"></option>
            </select>
          </label>
        </div>
        <label>Notas<input type="text" id="item-notes" /></label>
        <label style="margin-top:0.8rem">Etiquetas
          <div class="pill-input-wrap" id="item-tags-wrap" onclick="document.getElementById('item-tag-input').focus()">
            <input type="text" id="item-tag-input" data-placeholder="quickAdd.addTagPlaceholder" autocomplete="off"
                   oninput="App.tags.onInput('item')" onkeydown="App.tags.onKey(event,'item')" />
          </div>
          <div class="tag-suggestions" id="item-tag-suggestions"></div>
          <span style="font-size:0.75rem;color:var(--text3)" data-text="quickAdd.tagsHelp"></span>
        </label>
        <label class="toggle-label" style="margin-top:0.8rem;flex-direction:row;align-items:center;gap:0.6rem;cursor:pointer">
          <input type="checkbox" id="item-is-collection" style="width:auto;accent-color:var(--accent3)" />
          <span data-text="inventory.collectionSaved"></span>
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="App.closeModal('modal-item')" data-text="modal.cancel"></button>
        <button class="btn-primary" onclick="App.saveItem()" data-text="modal.save"></button>
      </div>
    </div>
  </div>

  <!-- ──── MODAL: VENTA ──── -->
  <div class="modal-overlay" id="modal-sell" onclick="App.closeModal('modal-sell')">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>💰 <span data-text="modal.sell.title"></span></h2>
        <button class="modal-close" onclick="App.closeModal('modal-sell')">✕</button>
      </div>
      <div class="modal-body">
        <p id="sell-item-name" class="sell-item-name"></p>
        <input type="hidden" id="sell-item-id" />
        <label>Precio de Venta (€) *
          <input type="number" id="sell-price" step="0.01" placeholder="0.00" />
        </label>
        <label style="margin-top:0.8rem">Fecha de Venta
          <input type="date" id="sell-date" />
        </label>
        <div id="sell-profit-preview" class="profit-preview"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="App.closeModal('modal-sell')" data-text="modal.cancel"></button>
        <button class="btn-success" onclick="App.confirmSell()">✅ <span data-text="modal.sell.confirm"></span></button>
      </div>
    </div>
  </div>

  <!-- ──── MODAL: LOT ──── -->
  <div class="modal-overlay" id="modal-lot" onclick="App.closeModal('modal-lot')">
    <div class="modal modal-lg" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>🎁 <span data-text="lots.newPurchaseLot"></span></h2>
        <button class="modal-close" onclick="App.closeModal('modal-lot')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label><span data-text="lots.lotName"></span> *<input type="text" id="lot-name" data-placeholder="quickAdd.namePlaceholder" /></label>
          <label>Fecha<input type="date" id="lot-date" /></label>
        </div>
        <div class="form-row">
          <label>Precio Sin Envío (€) *
            <input type="number" id="lot-price" step="0.01" oninput="App.recalcLotItems()" />
          </label>
          <label>Envío Total (€)
            <input type="number" id="lot-shipping" step="0.01" value="0" oninput="App.recalcLotItems()" />
          </label>
        </div>
        <label>Notas<input type="text" id="lot-notes" /></label>

        <div class="lot-items-section">
          <div class="lot-items-header">
            <h4 data-text="lots.lotItems"></h4>
            <button class="btn-sm" onclick="App.addLotItem()">+ <span data-text="lots.addItem"></span></button>
          </div>
          <div id="lot-items-list"></div>
          <div class="lot-total-info" id="lot-total-info"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="App.closeModal('modal-lot')" data-text="modal.cancel"></button>
        <button class="btn-primary" onclick="App.saveLot()" data-text="modal.lot.create"></button>
      </div>
    </div>
  </div>

  <!-- ──── MODAL: AÑADIR ARTÍCULOS A LOTE ──── -->
  <div class="modal-overlay" id="modal-add-to-lot" onclick="App.closeModal('modal-add-to-lot')">
    <div class="modal modal-lg" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div>
          <h2>➕ <span data-text="lots.addItemsTitle"></span></h2>
          <p id="add-to-lot-subtitle" style="font-size:0.8rem;color:var(--text2);margin-top:2px"></p>
        </div>
        <button class="modal-close" onclick="App.closeModal('modal-add-to-lot')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="add-to-lot-id" />
        <div class="lot-items-section" style="border-top:none;padding-top:0">
          <div class="lot-items-header">
            <h4 data-text="lots.itemsToAdd"></h4>
            <button class="btn-sm" onclick="App.addItemToLotForm()">+ <span data-text="lots.addItem"></span></button>
          </div>
          <div id="add-to-lot-items-list"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="App.closeModal('modal-add-to-lot')" data-text="modal.cancel"></button>
        <button class="btn-primary" onclick="App.saveAddToLot()">✅ <span data-text="modal.addToLot.confirm"></span></button>
      </div>
    </div>
  </div>

  <!-- ──── MODAL: DETALLE DE LOTE ──── -->
  <div class="modal-overlay" id="modal-lot-detail" onclick="App.closeModal('modal-lot-detail')">
    <div class="modal modal-lg" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div>
          <div style="display:flex;align-items:center;gap:0.7rem;margin-bottom:0.3rem">
            <span id="lot-detail-code" class="badge badge-lot-code"></span>
            <h2 id="lot-detail-name" style="font-size:1.05rem"></h2>
          </div>
          <div id="lot-detail-meta" style="font-size:0.78rem;color:var(--text2);display:flex;gap:1.2rem;flex-wrap:wrap"></div>
        </div>
        <div style="display:flex;gap:0.5rem;align-items:center;flex-shrink:0">
          <button class="btn-sm" id="lot-detail-add-btn" onclick="App.openAddToLotFromDetail()">+ <span data-text="lots.addItem"></span></button>
          <button class="btn-sm" id="lot-detail-edit-btn" onclick="App.openEditLotFromDetail()">✏️ <span data-text="common.edit"></span></button>
          <button class="modal-close" onclick="App.closeModal('modal-lot-detail')">✕</button>
        </div>
      </div>
      <div class="modal-body">
        <!-- Stats del lote -->
        <div class="lot-detail-stats" id="lot-detail-stats"></div>
        <!-- Listado de artículos -->
        <div id="lot-detail-items" style="margin-top:1rem;display:flex;flex-direction:column;gap:0.35rem"></div>
      </div>
    </div>
  </div>

  <!-- ──── MODAL: EDITAR LOTE ──── -->
  <div class="modal-overlay" id="modal-edit-lot" onclick="App.closeModal('modal-edit-lot')">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>✏️ <span data-text="lots.editTitle"></span></h2>
        <button class="modal-close" onclick="App.closeModal('modal-edit-lot')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-lot-id" />
        <label style="margin-bottom:1rem">Nombre *
          <input type="text" id="edit-lot-name" />
        </label>
        <label style="margin-bottom:1rem">Fecha de Compra
          <input type="date" id="edit-lot-date" />
        </label>
        <label>Notas
          <input type="text" id="edit-lot-notes" data-placeholder="quickAdd.notesPlaceholder" />
        </label>
        <p style="margin-top:0.8rem;font-size:0.78rem;color:var(--text2)">
          <span data-text="lots.warningDatePropagation"></span>
        </p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="App.closeModal('modal-edit-lot')" data-text="modal.cancel"></button>
        <button class="btn-primary" onclick="App.saveEditLot()" data-text="modal.save"></button>
      </div>
    </div>
  </div>

  <!-- ──── MODAL: ERRORES DE IMPORTACIÓN ──── -->
  <div class="modal-overlay" id="modal-import-errors" onclick="App.closeModal('modal-import-errors')">
    <div class="modal modal-lg" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div>
          <h2>⚠️ <span data-text="modal.importErrors.title"></span></h2>
          <p style="font-size:0.8rem;color:var(--text2);margin-top:3px" data-text="modal.importErrors.help"></p>
        </div>
        <button class="modal-close" onclick="App.closeModal('modal-import-errors')">✕</button>
      </div>
      <div class="modal-body" style="padding:0">
        <div id="import-errors-list" class="import-errors-list"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" onclick="App.closeModal('modal-import-errors')" data-text="modal.importErrors.understood"></button>
      </div>
    </div>
  </div>

  <!-- ──── MODAL: RENOMBRAR ETIQUETA ──── -->
  <div class="modal-overlay" id="modal-rename-tag" onclick="App.closeModal('modal-rename-tag')">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>✏️ <span data-text="modal.renameTag.title"></span></h2>
        <button class="modal-close" onclick="App.closeModal('modal-rename-tag')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="rename-tag-id" />
        <label><span data-text="modal.renameTag.newName"></span>
          <input type="text" id="rename-tag-input" data-placeholder="modal.renameTag.placeholder"
                 onkeydown="if(event.key==='Enter') App.confirmRenameTag()" />
        </label>
        <div id="rename-tag-preview" style="margin-top:0.8rem;min-height:1.5rem"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="App.closeModal('modal-rename-tag')" data-text="modal.cancel"></button>
        <button class="btn-primary" onclick="App.confirmRenameTag()" data-text="modal.save"></button>
      </div>
    </div>
  </div>

  <!-- ──── MODAL: CONFIRMACIÓN ──── -->
  <div class="modal-overlay" id="modal-confirm">
    <div class="modal modal-sm confirm-modal" onclick="event.stopPropagation()">
      <div class="confirm-icon" id="confirm-icon">🗑️</div>
      <div class="modal-body" style="text-align:center;padding-top:0">
        <p id="confirm-message" style="font-size:0.95rem;line-height:1.5;color:var(--text)"></p>
        <p id="confirm-submessage" style="font-size:0.8rem;color:var(--text3);margin-top:0.4rem"></p>
      </div>
      <div class="modal-footer" style="justify-content:center;gap:1rem">
        <button class="btn-secondary" id="confirm-cancel-btn" onclick="App.confirmDialog.cancel()" data-text="modal.cancel"></button>
        <button class="btn-danger" id="confirm-ok-btn" onclick="App.confirmDialog.accept()" data-text="modal.confirm.delete"></button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
